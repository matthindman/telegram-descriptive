resources:
  jobs:
    telegram_descriptive_pipeline:
      name: telegram_descriptive_pipeline
      tasks:
        - task_key: "00_data_inventory_and_contracts"
          notebook_task:
            notebook_path: "../notebooks/00_data_inventory_and_contracts.py"
            base_parameters:
              source_catalog: "${var.source_catalog}"
              too_schema: "${var.too_schema}"
              random_walk_schema: "${var.random_walk_schema}"
              output_catalog: "${var.output_catalog}"
              output_schema: "${var.output_schema}"
              execution_mode: "manifest_only"
        - task_key: "01_crawl_qa_and_walk_diagnostics"
          depends_on:
            - task_key: "00_data_inventory_and_contracts"
